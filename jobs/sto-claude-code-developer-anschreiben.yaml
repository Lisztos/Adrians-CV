# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.8/schema.json
#
# ANSCHREIBEN: Sto Building Solutions "Claude Code Entwickler (w/m/d)" über etengo (CA-102145).
# Begleitschreiben zur deutschen Bewerbung (siehe sto-claude-code-developer.yaml).
# Nutzt denselben Briefkopf und das classic-all-black-Styling wie der Lebenslauf.
cv:
  name: Adrian Sanchez
  headline: Senior Software Engineer, Schwerpunkt KI und Solution Architecture
  location: Berlin, Deutschland
  email: adrian@lisztostech.com
  website: https://adrianisanchez.com
  social_networks:
    - network: LinkedIn
      username: adrian-isaias-sanchez
  sections:
    Bewerbung als Claude Code Entwickler (w/m/d), Referenz CA-102145:
      - "etengo (Deutschland) AG, z. Hd. Frau Annika Schuhmacher"
      - "Berlin, 28. Juni 2026"
      - "Sehr geehrte Frau Schuhmacher,"
      - mit großem Interesse bewerbe ich mich auf das ausgeschriebene Projekt als Claude
        Code Entwickler. Als Senior Software Engineer mit über fünf Jahren Erfahrung im
        Aufbau und in der Skalierung von B2B-SaaS-Plattformen vereine ich genau die
        Schwerpunkte, die diese Position verlangt, nämlich Solution Architecture,
        KI-gestützte Produktentwicklung und die tägliche Arbeit mit Claude.
      - In meiner aktuellen Position habe ich unter anderem eine KI-gestützte Abrechnungs-Pipeline
        konzipiert und umgesetzt, die ein zuvor manuelles Reporting von einem Tag pro Monat
        auf zehn Minuten pro Woche reduziert hat. Darüber hinaus verantworte ich die
        Systemarchitektur, den Technologie-Stack und zahlreiche REST-API-Integrationen einer
        Multi-Service-Plattform mit über 3.000 Nutzern. Die KI-gestützte Entwicklung mit
        Claude ist für mich dabei kein Experiment, sondern fester Bestandteil meines
        Arbeitsalltags, vom Prototyp bis zur produktionsreifen Lösung.
      - Der Aufbau einer Digitalwerkstatt für die KI-basierte Softwareentwicklung reizt mich
        besonders, von der Technologieauswahl über die Architektur bis hin zu KI-Agenten für
        Marketing und Support. Meine Cloud-Erfahrung liegt schwerpunktmäßig auf AWS. Durch
        Integrationen mit der Microsoft Graph API und Power BI bin ich zugleich mit dem
        Microsoft-Ökosystem vertraut und arbeite mich entsprechend zügig in Azure ein. Agile
        Methoden wie Scrum und Kanban sowie testgetriebene Entwicklung sind für mich
        selbstverständlich.
      - Das Projekt kann ich ab sofort, in Vollzeit (fünf Tage pro Woche) und vollständig
        remote übernehmen. Über die Gelegenheit zu einem persönlichen Gespräch freue ich
        mich sehr.
      - "Mit freundlichen Grüßen"
      - "Adrian Sanchez"
locale:
  language: german
settings:
  pdf_title: Adrian Sanchez - Anschreiben
  render_command:
    pdf_path: OUTPUT_FOLDER/Adrian_Sanchez_Anschreiben.pdf
    typst_path: OUTPUT_FOLDER/Adrian_Sanchez_Anschreiben.typ
    markdown_path: OUTPUT_FOLDER/Adrian_Sanchez_Anschreiben.md
    html_path: OUTPUT_FOLDER/Adrian_Sanchez_Anschreiben.html
    png_path: OUTPUT_FOLDER/Adrian_Sanchez_Anschreiben.png
design:
  theme: classic
  colors:
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(0, 0, 0)
  page:
    show_top_note: false
    show_footer: false
    top_margin: 1.0cm
    bottom_margin: 1.0cm
    left_margin: 1.6cm
    right_margin: 1.6cm
  header:
    space_below_name: 0.4cm
    space_below_headline: 0.35cm
    space_below_connections: 0.55cm
    connections:
      show_icons: true
      hyperlink: true
      display_urls_instead_of_usernames: false
  section_titles:
    space_above: 0.75cm
    space_below: 0.25cm
  sections:
    space_between_regular_entries: 0.7em
