        position: Full Stack Software Engineer / Team Lead
        location: Munich
        start_date: 2022-02
        end_date: 2023-09
        summary: "**Tech Stack:** Ruby on Rails, PostgreSQL, Redis, REST APIs, Vue.js,
          Terraform, Gitlab, AWS"
        highlights:
          - Led a team of ~10 engineers maintaining core backend services for a B2B SaaS
            platform used by 20,000+ users
          - Shipped features end to end, from system design to production deployment
          - Owned scheduling, Salesforce/HubSpot/Pipedrive integrations, user onboarding,
            and core video workflows
          - Worked in a cross-functional feature team that integrated Google Meet to the
            platform
          - Refactored core modules and reduced codebase complexity by ~15 percent
          - Reduced engineering backlog by ~40 percent during team lead period while
            maintaining continuous feature delivery
      - company: Setting HQ
        position: Ruby on Rails Engineer (Intern)
        location: Berlin
        start_date: 2020-10
        end_date: 2022-02
        highlights:
          - Optimized the platform's Office Search functionality, reducing page load
            times by 45%.
          - Developed an office onboarding system, digitizing a previous manual and
            error-prone system
          - Eliminated legacy dependencies by migrating the platform to a modern system
            architecture
    education:
      - institution: Technische Universität Berlin
        area: Business Informatics (Wirtschaftsinformatik)
        degree: B.Sc.
        start_date: 2018
        end_date: 2022
    skills:
      - label: Backend
        details: Ruby on Rails, REST APIs, PostgreSQL, Redis
      - label: Frontend
        details: Vue.js, React, Angular.js, TypeScript
      - label: DevOps
        details: AWS, Docker, Terraform, CI/CD
      - label: Practices
        details: Software architecture, scalable design, automated testing, agile teams
    languages:
      - label: Languages
        details: Spanish (native), English (fluent), German (fluent)
design:
  theme: engineeringresumes
  page:
    show_top_note: false
    top_margin: 1.0cm
    bottom_margin: 1.0cm
    left_margin: 1.6cm
    right_margin: 1.6cm
  header:
    space_below_name: 0.4cm
    space_below_headline: 0.35cm
    space_below_connections: 0.55cm
    connections:
      show_icons: true
      hyperlink: true
      display_urls_instead_of_usernames: false
  section_titles:
    space_above: 0.75cm
    space_below: 0.25cm
  sections:
    space_between_regular_entries: 1em
  templates:
    experience_entry:
      main_column: "**POSITION**, COMPANY -- LOCATION\nHIGHLIGHTS\nSUMMARY"
      date_and_location_column: DATE
