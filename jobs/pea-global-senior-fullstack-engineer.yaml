        testing.
    experience:
      - company: Innovandio GmbH
        position: Senior Software Engineer
        location: Berlin
        start_date: 2023-10
        end_date: 2026-05
        summary: "**Tech Stack:** Ruby on Rails, PostgreSQL, Redis, REST APIs, Vue.js,
