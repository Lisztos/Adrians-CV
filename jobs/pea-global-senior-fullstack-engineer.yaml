cv:
  name: Adrian Sanchez
  headline: Senior Fullstack Engineer
  location: Berlin, Germany
  email: adrian@lisztostech.com
  website: https://adrianisanchez.com
  social_networks:
    - network: LinkedIn
      username: adrian-isaias-sanchez
  sections:
    summary:
