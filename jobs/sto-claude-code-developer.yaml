    space_between_regular_entries: 1em
    show_time_spans_in: []
  templates:
    experience_entry:
      main_column: "**POSITION**, COMPANY\nHIGHLIGHTS\nSUMMARY"
      date_and_location_column: "DATE\nLOCATION"
